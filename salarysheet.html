<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOTAL SALES PROFIT </title>

</head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales and Profit Report</title>
    <style>
       
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        table {
            width: 50%;
            border-collapse: collapse;
            margin: 100px 0;
            background-color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        th, td {
            border: 1px solid #ddd;
            padding: 42px;
            text-align: center;
        }
        th {
            background-color: #4CAF50;
            color: white;
        }
        tr:nth-child(even) {
            background-color: #f2f2f2;
        }
        .total-row {
            background-color: #e9e9e9;
            font-weight: bold;
        }
        .title-cell {
            background-color: #333;
            color: white;
            font-size: 1.5em;
        }
    </style>
</head>
<body>

    <table>
        <thead>
            <!-- Using colspan to merge the title cell across 3 columns -->
            <tr>
                <th colspan="3" class="title-cell">Annual Sales and Profit Summary</th>
            </tr>
            <tr>
                <th>Month</th>
                <th>Sales ($)</th>
                <th>Profit ($)</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Jan</td>
                <td>10,000</td>
                <td>2,000</td>
            </tr>
            <tr>
                <td>Feb</td>
                <td>12,000</td>
                <td>2,500</td>
            </tr>
            <tr>
                <td>Mar</td>
                <td>15,000</td>
                <td>3,000</td>
            </tr>
        </tbody>
        <tfoot>
            <tr class="total-row">
                <!-- Using rowspan to span the "Total" label vertically across two cells -->
                <td rowspan="2">Total (Q1)</td>
                <td>37,000</td>
                <td>7,500</td>
            </tr>
            <tr class="total-row">
                <!-- Data for the second row of the total section -->
                <td colspan="2">Overall Performance: Excellent</td>
            </tr>
        </tfoot>
    </table>

</body>
</html>
